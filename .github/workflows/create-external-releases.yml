name: Create External Folder Releases and Manifest

permissions:
  contents: write
  pull-requests: write

on:
  release:
    types: [published]
  # Optional: add this to allow manual runs for any tag
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag of the release to update'
        required: false

jobs:
  create_zips_and_manifest:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_REF_NAME: ${{ github.event.release.tag_name || inputs.release_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # Full commit graph is required so generate-release.py can call
          # git.iter_commits(paths=..., max_count=1) per external folder.
          # A blobless partial clone keeps all commits + tree objects but
          # skips historical blob content, cutting the initial transfer
          # dramatically as external/ grows. Blobs for the current tip are
          # fetched on demand when the release script reads folder files.
          fetch-depth: 0
          filter: blob:none
          submodules: false
          lfs: false

      - name: Set up Python 3.11 (with pip cache)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: '**/requirements.txt'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/workflows/scripts/requirements.txt

      - name: Generate changed zips only
        run: python .github/workflows/scripts/generate-release.py

      - name: Update Release notes (optional)
        run: python .github/workflows/scripts/generate-release-notes.py

      - name: Regenerate README table listings
        id: readme_gen
        run: |
          # On a release run, rewrite README.md in place and stage the change.
          # On a manual workflow_dispatch run, only print what would change
          # (dry-run) so operators can review before committing.
          if [ "${{ github.event_name }}" = "release" ]; then
            python .github/workflows/scripts/generate-readme-tables.py
          else
            echo "workflow_dispatch: dry-run only (no README write, no commit)."
            python .github/workflows/scripts/generate-readme-tables.py --check
          fi

      - name: Open PR for README updates
        if: github.event_name == 'release'
        run: |
          if [ -z "$(git status --porcelain README.md)" ]; then
            echo "No README changes to commit."
            exit 0
          fi
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          PR_BRANCH="chore/regenerate-readme-tables"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$DEFAULT_BRANCH"
          # Base the PR branch on the current tip of the default branch so the
          # diff is limited to the regenerated README, even though this workflow
          # runs at the release tag ref.
          git checkout -B "$PR_BRANCH" "origin/$DEFAULT_BRANCH"
          python .github/workflows/scripts/generate-readme-tables.py
          if [ -z "$(git status --porcelain README.md)" ]; then
            echo "No README changes after rebasing onto $DEFAULT_BRANCH."
            exit 0
          fi
          git add README.md
          git commit -m "chore: regenerate README table listings [skip ci]"
          # Force-push so the branch always mirrors the latest regeneration and
          # any previously opened PR just picks up new commits instead of
          # accumulating stale ones.
          git push --force origin "HEAD:$PR_BRANCH"
          # Reuse an existing open PR for this branch if there is one; otherwise
          # open a new one against the protected default branch.
          EXISTING_PR=$(gh pr list --head "$PR_BRANCH" --base "$DEFAULT_BRANCH" --state open --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Existing PR #$EXISTING_PR updated with new README regeneration commit."
          else
            gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$PR_BRANCH" \
              --title "chore: regenerate README table listings" \
              --body "Automated regeneration of the Wizard Tables and Manual Install Tables sections in README.md, triggered by release \`${GITHUB_REF_NAME}\`."
          fi
